services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: esitrana_app
    ports:
      - "8081:80"
    environment:
      DB_HOST: db
      DB_NAME: E_sitrana_db
      DB_USER: esitrana
      DB_PASS: E_sitrana@2024!
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: esitrana_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: E_sitrana_db
      MYSQL_USER: esitrana
      MYSQL_PASSWORD: E_sitrana@2024!
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
      - ./database_setup.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: esitrana_phpmyadmin
    restart: always
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

volumes:
  db_data: